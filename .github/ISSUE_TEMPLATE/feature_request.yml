name: Feature request
description: Suggest a figure control, data improvement, or workflow enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What figure or workflow are you trying to produce?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the control, output, or data change that would address the use case.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any current workarounds or related approaches.
